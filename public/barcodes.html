  <script>
    // EAN-13 encoding tables
    const L = ['0001101','0011001','0010011','0111101','0100011','0110001','0101111','0111011','0110111','0001011'];
    const G = ['0100111','0110011','0011011','0100001','0011101','0111001','0000101','0010001','0001001','0010111'];
    const R = ['1110010','1100110','1101100','1000010','1011100','1001110','1010000','1000100','1001000','1110100'];

    // Parity patterns for first digit (L=false, G=true)
    const PARITY = [
      [false,false,false,false,false,false], // 0
      [false,false,true, false,true, true],  // 1
      [false,false,true, true, false,true],  // 2
      [false,false,true, true, true, false], // 3
      [false,true, false,false,true, true],  // 4
      [false,true, true, false,false,true],  // 5
      [false,true, true, true, false,false], // 6
      [false,true, false,true, false,true],  // 7
      [false,true, false,true, true, false], // 8
      [false,true, true, false,true, false], // 9
    ];

    function encodeEAN13(ean) {
      const d = ean.split('').map(Number);
      const first = d[0];
      const parity = PARITY[first];
      let bits = '101'; // left guard
      for (let i = 0; i < 6; i++) {
        bits += parity[i] ? G[d[i + 1]] : L[d[i + 1]];
      }
      bits += '01010'; // center guard
      for (let i = 7; i < 13; i++) {
        bits += R[d[i]];
      }
      bits += '101'; // right guard
      return bits;
    }

    function drawBarcode(canvas, ean, description, identifier) {
      const bits = encodeEAN13(ean);
      const moduleWidth = 2;
      const totalBars = bits.length; // 95
      const quietZone = 10;
      const barcodeWidth = totalBars * moduleWidth;
      const width = barcodeWidth + quietZone * 2;
      const height = 80;
      const textHeight = 14;
      const guardExtra = 5;

      canvas.width = width;
      canvas.height = height + textHeight;

      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw bars
      // Guards extend lower than data bars
      const guardPositions = new Set();
      // left guard: bits 0-2, center guard: bits 45-49, right guard: bits 92-94
      for (let i = 0; i <= 2; i++) guardPositions.add(i);
      for (let i = 45; i <= 49; i++) guardPositions.add(i);
      for (let i = 92; i <= 94; i++) guardPositions.add(i);

      for (let i = 0; i < bits.length; i++) {
        if (bits[i] === '1') {
          const x = quietZone + i * moduleWidth;
          const isGuard = guardPositions.has(i);
          const barHeight = isGuard ? height + guardExtra : height;
          ctx.fillStyle = '#000000';
          ctx.fillRect(x, 0, moduleWidth, barHeight);
        }
      }

      // Draw digit text below bars
      ctx.fillStyle = '#000000';
      ctx.font = `bold ${textHeight - 2}px monospace`;
      ctx.textBaseline = 'top';
      ctx.textAlign = 'left';

      const digits = ean.split('');
      // First digit left of left guard
      ctx.fillText(digits[0], 1, height + 2);

      // Left group: digits 1-6, centered over their bars (bits 3-44, 7 bits each)
      for (let i = 0; i < 6; i++) {
        const startBit = 3 + i * 7;
        const x = quietZone + startBit * moduleWidth + (7 * moduleWidth) / 2;
        ctx.textAlign = 'center';
        ctx.fillText(digits[i + 1], x, height + 2);
      }

      // Right group: digits 7-12, centered over their bars (bits 50-91, 7 bits each)
      for (let i = 0; i < 6; i++) {
        const startBit = 50 + i * 7;
        const x = quietZone + startBit * moduleWidth + (7 * moduleWidth) / 2;
        ctx.textAlign = 'center';
        ctx.fillText(digits[i + 7], x, height + 2);
      }
    }
